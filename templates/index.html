<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibra — Song Recognizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #080818;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
      gap: 40px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #aaa;
    }

    /* Shazam-style button */
    .btn-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ripple {
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(32, 156, 238, 0.15);
      animation: none;
    }
    .ripple:nth-child(2) { animation-delay: 0.4s; }
    .ripple:nth-child(3) { animation-delay: 0.8s; }

    @keyframes ripple {
      0%   { transform: scale(1);   opacity: 0.6; }
      100% { transform: scale(2.4); opacity: 0; }
    }

    .btn-wrap.listening .ripple {
      animation: ripple 1.6s ease-out infinite;
    }

    .shazam-btn {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: linear-gradient(135deg, #209CEE 0%, #0f6eb5 100%);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(32,156,238,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      z-index: 1;
    }

    .shazam-btn:hover { transform: scale(1.05); box-shadow: 0 0 60px rgba(32,156,238,0.6); }
    .shazam-btn:active { transform: scale(0.97); }
    .shazam-btn:disabled { opacity: 0.5; cursor: default; }

    .shazam-btn svg { width: 56px; height: 56px; fill: #fff; }

    /* Status text */
    #status {
      font-size: 1rem;
      color: #888;
      min-height: 1.4em;
      text-align: center;
      transition: color 0.2s;
    }

    /* Result card */
    #result {
      display: none;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 24px 32px;
      width: min(380px, 90vw);
      display: none;
      flex-direction: row;
      gap: 20px;
      align-items: center;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #result img {
      width: 80px;
      height: 80px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: #222;
    }

    .track-info { flex: 1; overflow: hidden; }

    .track-title {
      font-size: 1.2rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 0.95rem;
      color: #aaa;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-genre {
      font-size: 0.75rem;
      color: #209CEE;
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .track-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding: 8px 16px;
      background: linear-gradient(135deg, #209CEE 0%, #0f6eb5 100%);
      color: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 20px;
      letter-spacing: 0.03em;
      transition: opacity 0.15s, transform 0.15s;
    }
    .track-link:hover { opacity: 0.85; transform: scale(1.03); }

    #error {
      color: #e05c5c;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }

    /* source selector */
    .source-row {
      display: flex;
      gap: 12px;
    }

    .source-btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: #aaa;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .source-btn.active {
      background: rgba(32,156,238,0.2);
      border-color: #209CEE;
      color: #fff;
    }
  </style>
</head>
<body>

  <h1>Vibra</h1>

  <div class="source-row">
    <button class="source-btn active" id="btn-mic" onclick="setSource('mic')">Microphone</button>
    <button class="source-btn" id="btn-tab" onclick="setSource('tab')">Tab / Screen audio</button>
  </div>

  <div class="btn-wrap" id="btnWrap">
    <div class="ripple"></div>
    <div class="ripple"></div>
    <div class="ripple"></div>
    <button class="shazam-btn" id="mainBtn" onclick="toggleRecord()">
      <!-- S logo / mic icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1a4 4 0 0 1 4 4v7a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm6.5 10.5a.75.75 0 0 1 .75.75 7.25 7.25 0 0 1-6.5 7.21V21h2.5a.75.75 0 0 1 0 1.5h-6.5a.75.75 0 0 1 0-1.5H11v-1.54A7.25 7.25 0 0 1 4.75 12.25a.75.75 0 0 1 1.5 0 5.75 5.75 0 0 0 11.5 0 .75.75 0 0 1 .75-.75z"/>
      </svg>
    </button>
  </div>

  <div id="status">Tap to identify</div>
  <div id="error"></div>

  <div id="result">
    <img id="cover" src="" alt="cover" />
    <div class="track-info">
      <div class="track-title" id="title"></div>
      <div class="track-artist" id="artist"></div>
      <div class="track-genre" id="genre"></div>
      <a class="track-link" id="link" href="#" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm0 4a8 8 0 1 1 0 16A8 8 0 0 1 12 4zm-.5 3v5.25l4.5 2.25-.75 1.5L10 13.5V7h1.5z"/></svg>
        Ver en Shazam
      </a>
    </div>
  </div>

  <script>
    let recording = false;
    let mediaRecorder = null;
    let chunks = [];
    let source = 'mic';

    function setSource(s) {
      source = s;
      document.getElementById('btn-mic').classList.toggle('active', s === 'mic');
      document.getElementById('btn-tab').classList.toggle('active', s === 'tab');
    }

    async function toggleRecord() {
      if (recording) return; // let it finish naturally
      await startRecord();
    }

    async function startRecord() {
      setStatus('Requesting audio access...');
      hideResult();

      let stream;
      try {
        if (source === 'tab') {
          const display = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
          // keep only audio tracks
          display.getVideoTracks().forEach(t => t.stop());
          stream = new MediaStream(display.getAudioTracks());
        } else {
          stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        }
      } catch (e) {
        setStatus('Tap to identify');
        showError('Could not access audio: ' + e.message);
        return;
      }

      chunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      mediaRecorder.onstop = () => { stream.getTracks().forEach(t => t.stop()); sendAudio(); };
      mediaRecorder.start();
      recording = true;

      document.getElementById('btnWrap').classList.add('listening');
      setStatus('Listening... (5 seconds)');
      document.getElementById('mainBtn').disabled = true;

      setTimeout(() => {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
          mediaRecorder.stop();
          recording = false;
        }
      }, 5000);
    }

    async function sendAudio() {
      setStatus('Identifying...');
      document.getElementById('btnWrap').classList.remove('listening');

      const blob = new Blob(chunks, { type: 'audio/webm' });
      const form = new FormData();
      form.append('audio', blob, 'clip.webm');

      try {
        const res = await fetch('/recognize', { method: 'POST', body: form });
        const data = await res.json();

        if (!res.ok || data.error) {
          showError(data.error || 'Not recognized');
          setStatus('Tap to identify');
        } else {
          showResult(data);
          setStatus('');
        }
      } catch (e) {
        showError('Network error: ' + e.message);
        setStatus('Tap to identify');
      }

      document.getElementById('mainBtn').disabled = false;
    }

    function showResult(d) {
      document.getElementById('title').textContent = d.title;
      document.getElementById('artist').textContent = d.artist;
      document.getElementById('genre').textContent = d.genre || '';
      document.getElementById('cover').src = d.cover || '';
      const link = document.getElementById('link');
      if (d.shazam_url) { link.href = d.shazam_url; link.style.display = 'inline'; }
      else { link.style.display = 'none'; }
      const el = document.getElementById('result');
      el.style.display = 'flex';
      document.getElementById('error').style.display = 'none';
    }

    function hideResult() {
      document.getElementById('result').style.display = 'none';
      document.getElementById('error').style.display = 'none';
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('result').style.display = 'none';
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }
  </script>
</body>
</html>
